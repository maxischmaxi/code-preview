services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: code-preview-server
    volumes:
      - .:/usr/server
      - /usr/server/node_modules
    ports:
      - 5172:5172
    env_file:
      - path: ./.env
      - path: ./.env.local
        required: false
    environment:
      - TERM=xterm-256color
      - NODE_ENV=development
    networks:
      - internal
      - default
    expose:
      - 5172
    command: ["npm", "run", "start-server"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: code-preview-web
    volumes:
      - .:/usr/web
      - /usr/web/node_modules
    ports:
      - 5173:5173
    env_file:
      - path: ./.env
      - path: ./.env.local
        required: false
    environment:
      - TERM=xterm-256color
      - NODE_ENV=development
    networks:
      - internal
      - default
    expose:
      - 5173
    command: ["npm", "run", "dev"]

networks:
  internal:
  default:
